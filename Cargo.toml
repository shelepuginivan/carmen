[workspace]
resolver = "3"
members = [
    "carmen-indexer",
    "carmen-migrations",
    "carmen-search",
]

[workspace.package]
authors = ["Ivan Shelepugin <shelepuginivanm@gmail.com>"]
version = "0.1.0"
edition = "2024"

[workspace.dependencies]
anyhow = "1.0"
axum = "0.8"
env_logger = "0.11"
fastembed = "5"
log = "0.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sqlx = { version = "0.8", features = ["runtime-tokio", "postgres"] }
tokio = { version = "1", features = ["full"] }
