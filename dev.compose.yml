services:
  postgres:
    image: pgvector/pgvector:pg18-trixie
    container_name: carmen-postgres
    env_file:
      - env/.env.postgres
    restart: unless-stopped
    volumes:
      - pg_data:/var/lib/postgresql

  rustfs:
    image: rustfs/rustfs:latest
    container_name: carmen-rustfs
    ports:
      - 9001:9001  # Web console
    env_file:
      - env/.env.rustfs
    restart: unless-stopped
    volumes:
      - rustfs_data:/data/rustfs

  migrations:
    image: localhost/carmen-migrations:latest
    container_name: carmen-migrations
    env_file:
      - env/.env.migrations
    restart: unless-stopped
    depends_on:
      - postgres

  extractor:
    image: localhost/carmen-extractor:latest
    container_name: carmen-extractor
    env_file:
      - env/.env.extractor
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_started
      rustfs:
        condition: service_started
      migrations:
        condition: service_completed_successfully

  indexer:
    image: localhost/carmen-indexer:latest
    container_name: carmen-indexer
    env_file:
      - env/.env.indexer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_started
      rustfs:
        condition: service_started
      migrations:
        condition: service_completed_successfully
    volumes:
      - fastembed_cache:/app/.fastembed_cache

  search:
    image: localhost/carmen-search:latest
    container_name: carmen-search
    env_file:
      - env/.env.search
    ports:
      - 5124:5124
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_started
      rustfs:
        condition: service_started
      migrations:
        condition: service_completed_successfully
    volumes:
      - fastembed_cache:/app/.fastembed_cache


volumes:
  pg_data:
  rustfs_data:
  fastembed_cache:
